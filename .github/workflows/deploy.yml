# Workflow para implantar o build do Vite automaticamente no GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Executa a cada push na branch principal (pode ser master/main)
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Dependências
        run: npm ci

      - name: Compilar Projeto (Vite Build)
        run: npm run build

      - name: Upload de Artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
